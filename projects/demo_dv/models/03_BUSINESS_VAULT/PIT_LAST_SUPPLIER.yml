version: 2

models:
  - name: PIT_LAST_SUPPLIER
    description: "PIT containing the last available information per supplier per satellite"

    config:
      access: public
      materialized: view
      contract:
        enforced: true

    columns:
      - name: HUB_ID_SUPPLIER
        data_type: VARCHAR
        description: "Hub id for supplier"
        data_tests:
          - unique
          - not_null

      - name: DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Hub id load timestamp"

      - name: SAT_STATIC_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Latest load timestamp from SAT_SUPPLIER_STATIC"

      - name: SAT_DETAIL_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Latest load timestamp from SAT_SUPPLIER_DETAIL"

      - name: TENANT
        data_type: VARCHAR
        description: "Tenant information"
