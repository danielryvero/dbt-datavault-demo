version: 2

models:
  - name: PIT_LAST_ORDERS
    description: "PIT containing the last available information per order per satellite"

    config:
      access: public
      contract:
        enforced: true

    columns:
      - name: HUB_ID_ORDERS
        data_type: VARCHAR
        description: "Hub id for orders"
        data_tests:
          - unique
          - not_null

      - name: DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Hub id load timestamp"

      - name: SAT_DETAIL_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Latest load timestamp from SAT_ORDERS_DETAIL"

      - name: SAT_MAIN_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Latest load timestamp from SAT_ORDERS_MAIN"

      - name: TENANT
        data_type: VARCHAR
        description: "Tenant information"
