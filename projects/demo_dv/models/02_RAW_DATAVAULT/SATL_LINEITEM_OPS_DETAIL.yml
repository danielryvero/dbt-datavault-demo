version: 2

models:
  - name: SATL_LINEITEM_OPS_DETAIL
    description: "Lineitem Satellite holding detail information"
    columns:
      - name: LINK_ID_LINEITEM_OPS
        description: "The primary key for this table"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('LNK_LINEITEM_ORDERS_PART_SUPPLIER')
                field: LINK_ID_LINEITEM_OPS          
      - name: TENANT
        description: "Tenant information"          
      - name: LINE_NUMBER
        description: "Line number"
      - name: LINE_STATUS
        description: "Line status"
        data_tests: 
          - accepted_values:
              arguments:
                values: ['O','F']
      - name: QUANTITY
        description: "Quantity"      
      - name: EXTENDED_PRICE
        description: "Extension in price"      
      - name: DISCOUNT
        description: "Discount applied"      
      - name: TAX
        description: "Tax applied"      
      - name: RETURN_FLAG
        description: "Return flag"      
        data_tests:
          - accepted_values:
              arguments:
                values: ['N','R','A']
      - name: DT_LOAD
        description: "Datetime the data has been loaded"
      - name: HASH_DIFF
        description: "hash diff identifier of the record"
      - name: RECORD_SOURCE
        description: "Source system for the record"	