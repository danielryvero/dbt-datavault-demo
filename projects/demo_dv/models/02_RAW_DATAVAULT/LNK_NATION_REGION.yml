version: 2

models:

  - name: LNK_NATION_REGION
    description: "Link for nation region table"
    config:
      contract:
        enforced: true
        
    columns:
      - name: LINK_ID_NATION_REGION
        data_type: VARCHAR
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: HUB_ID_NATION
        data_type: VARCHAR
        description: "HUB ID key associated to the NATION"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('HUB_NATION')
                field: HUB_ID_NATION          
      - name: HUB_ID_REGION
        data_type: VARCHAR
        description: "HUB ID key associated to the REGION"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('HUB_REGION')
                field: HUB_ID_REGION          
      - name: NATION_KEY
        data_type: decimal(38,0)
        description: "Business key associated to the NATION"
      - name: REGION_KEY	
        data_type: decimal(38,0)  
        description: "Business key associated to the REGION"
      - name: TENANT
        data_type: VARCHAR
        description: "Tenant information"
      - name: DT_LOAD
        data_type: datetime
        description: "Datetime the data has been loaded"
      - name: RECORD_SOURCE
        data_type: VARCHAR
        description: "Source system for the record"			
