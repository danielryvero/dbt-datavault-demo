version: 2

models:
  - name: PIT_HIST_PART
    description: "PIT containing the historical part data"

    config:
      access: public
      contract:
        enforced: true

    columns:
      - name: HUB_ID_PART
        data_type: VARCHAR
        description: "Hub id for part"
        data_tests:
          - unique
          - not_null

      - name: DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Hub id load timestamp"

      - name: SAT_STATIC_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Satellite load timestamp from SAT_PART_STATIC"

      - name: SAT_MAIN_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Satellite load timestamp from SAT_PART_MAIN"

      - name: TENANT
        data_type: VARCHAR
        description: "Tenant information"
