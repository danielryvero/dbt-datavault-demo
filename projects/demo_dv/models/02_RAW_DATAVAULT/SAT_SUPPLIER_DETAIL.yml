version: 2

models:
  - name: SAT_SUPPLIER_DETAIL
    description: "Supplier Satellite holding detail information"
    columns:
      - name: HUB_ID_SUPPLIER
        description: "The primary key for this table"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('HUB_SUPPLIER')
                field: HUB_ID_SUPPLIER       
      - name: TENANT
        description: "Tenant information"          
      - name: ACCOUNT_BALANCE
        description: "Supplier account balance"
      - name: COMMENT
        description: "Additional comments"
      - name: DT_LOAD
        description: "Datetime the data has been loaded"
      - name: HASH_DIFF
        description: "hash diff identifier of the record"
      - name: RECORD_SOURCE
        description: "Source system for the record"		