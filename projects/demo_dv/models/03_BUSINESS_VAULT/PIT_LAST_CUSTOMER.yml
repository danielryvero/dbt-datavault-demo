version: 2

models:
  - name: PIT_LAST_CUSTOMER
    description: "PIT containing the last available information per customer per satellite"

    config:
      access: public
      contract:
        enforced: true

    columns:
      - name: HUB_ID_CUSTOMER
        data_type: VARCHAR
        description: "Hub id for customer"
        data_tests:
          - unique
          - not_null

      - name: DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Hub id load timestamp"

      - name: SAT_CONTACT_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Latest load timestamp from SAT_CUSTOMER_CONTACT"

      - name: SAT_METRICS_DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Latest load timestamp from SAT_CUSTOMER_METRICS"

      - name: TENANT
        data_type: VARCHAR
        description: "Tenant information"
