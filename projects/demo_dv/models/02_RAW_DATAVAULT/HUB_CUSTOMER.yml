version: 2

models:
  - name: HUB_CUSTOMER
    description: "HUB customer table"

    config:
      access: public
      contract:
        enforced: true
            
    columns:
      - name: HUB_ID_CUSTOMER
        data_type: VARCHAR
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: CUSTOMER_KEY
        data_type: decimal(38,0)
        description: "Business key associated to the hub"
      - name: TENANT
        data_type: VARCHAR      
        description: "Tenant information"
      - name: DT_LOAD
        data_type: TIMESTAMP_NTZ
        description: "Datetime the data has been loaded"
      - name: RECORD_SOURCE
        data_type: VARCHAR
        description: "Source system for the record"		
