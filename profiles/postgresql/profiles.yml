sdg_dv_fw:
  outputs:
    dev:
      type:     postgres
      host:     "{{ env_var('PGHOST') }}" 
      user:     "{{ env_var('PGUSER') }}" 
      password: "{{ env_var('PGPASSWORD') }}" 
      dbname:   "{{ env_var('PGDATABASE') }}" 
      schema:   "{{ env_var('PGSCHEMA') }}"
      port:     "{{ env_var('PGPORT')| int  }}"
      threads:  2
  target: dev      
