version: 2

models:
  - name: SATL_LINEITEM_OPS_DATES
    description: "Lineitem Satellite holding dates information"
    columns:
      - name: LINK_ID_LINEITEM_OPS
        description: "The primary key for this table"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('LNK_LINEITEM_ORDERS_PART_SUPPLIER')
                field: LINK_ID_LINEITEM_OPS
      - name: TENANT
        description: "Tenant information"          
      - name: SHIP_DATE
        description: "Shipment date"
      - name: COMMIT_DATE
        description: "Date of commitment"
      - name: RECEIPT_DATE
        description: "Date of the receipt"      
      - name: SHIP_INSTRUCTIONS
        description: "Shipment instructions"    
        data_tests:
          - accepted_values:
              arguments:
                values: ['COLLECT COD','TAKE BACK RETURN','NONE','DELIVER IN PERSON']  
      - name: SHIP_MODE
        description: "Shipment mode"      
        data_tests:
          - accepted_values:
              arguments:
                values: ['TRUCK','MAIL','SHIP','RAIL','REG AIR','AIR','FOB']
      - name: COMMENTS
        description: "Additional comments"      
      - name: DT_LOAD
        description: "Datetime the data has been loaded"
      - name: HASH_DIFF
        description: "hash diff identifier of the record"
      - name: RECORD_SOURCE
        description: "Source system for the record"	