
version: 2

models:

  - name: HUB_PART
    description: "HUB Part table"
    config:
      contract:
        enforced: true
        
    columns:
      - name: HUB_ID_PART
        data_type: VARCHAR
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: PART_KEY
        data_type: decimal(38,0)
        description: "Business key associated to the hub"
      - name: TENANT
        data_type: VARCHAR
        description: "Tenant information"
      - name: DT_LOAD
        description: "Datetime the data has been loaded"		
        data_type: datetime
      - name: RECORD_SOURCE
        data_type: VARCHAR
        description: "Source system for the record"			