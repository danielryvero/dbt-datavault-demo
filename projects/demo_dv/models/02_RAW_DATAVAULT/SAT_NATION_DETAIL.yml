
version: 2

models:
  - name: SAT_NATION_DETAIL
    description: "Nation Satellite holding detail information"
    columns:
      - name: HUB_ID_NATION
        description: "The primary key for this table"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('HUB_NATION')
                field: HUB_ID_NATION
      - name: TENANT
        description: "Tenant information"
      - name: NATION
        description: "Nation name associated with the ID"
      - name: COMMENT
        description: "Additional comments"
      - name: DT_LOAD
        description: "Datetime the data has been loaded"
      - name: HASH_DIFF
        description: "hash diff identifier of the record"
      - name: RECORD_SOURCE
        description: "Source system for the record"		