version: 2

models:
  - name: SAT_ORDERS_MAIN
    description: "Orders Satellite holding main information"
    columns:
      - name: HUB_ID_ORDERS
        description: "The primary key for this table"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('HUB_ORDERS')
                field: HUB_ID_ORDERS
      - name: TENANT
        description: "Tenant information"          
      - name: STATUS
        description: "Status associated to the order"
      - name: ORDER_DATE
        description: "Date of the order"
      - name: TOTAL_PRICE
        description: "Price of the order"
      - name: DT_LOAD
        description: "Datetime the data has been loaded"
      - name: HASH_DIFF
        description: "hash diff identifier of the record"
      - name: RECORD_SOURCE
        description: "Source system for the record"		